<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" aria-label="@wasrusgen1">
  <g stroke="#C9A227" fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">

    <!-- ============ ПИЛА (циркулярная), центр сверху ============ -->

    <!-- Корпус мотора — наклонённый параллелограмм -->
    <path d="
      M 280 70
      L 470 35
      Q 500 32 506 60
      L 520 130
      Q 525 158 500 165
      L 320 200
      Q 295 205 290 180
      L 272 95
      Q 268 75 280 70 Z
    "/>

    <!-- Отверстие под палец/рукоятку -->
    <ellipse cx="450" cy="85" rx="12" ry="18"/>

    <!-- Соединение корпуса с кожухом диска -->
    <path d="M 290 180 Q 285 200 280 220"/>
    <path d="M 500 165 Q 520 185 520 215"/>

    <!-- Купол кожуха над диском -->
    <path d="M 230 280 Q 300 200 380 200 Q 460 200 540 280" />

    <!-- Основной диск (круг) -->
    <circle cx="380" cy="285" r="105" />

    <!-- Центральный болт-ось -->
    <circle cx="380" cy="285" r="22" />
    <circle cx="380" cy="285" r="9" fill="#C9A227" stroke="none"/>

    <!-- Зубья (плотный ряд по нижней дуге) -->
    <path d="
      M 280 295
      l 0 22 l 14 -6
      l 6 18 l 14 -8
      l 10 18 l 14 -10
      l 14 16 l 14 -12
      l 18 14 l 14 -14
      l 22 12 l 12 -16
      l 22 8 l 8 -18
      l 22 4 l 4 -20
      l 22 0
    "/>

    <!-- Опорный брус (станина под диском) -->
    <line x1="200" y1="290" x2="560" y2="290" stroke-width="14"/>

  </g>

  <!-- ============ WORDMARK @WASRUSGEN1 ============ -->
  <text
    x="360" y="490"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="900"
    font-size="115"
    letter-spacing="-2"
    fill="#C9A227"
  >@WASRUSGEN1</text>
</svg>
